<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWOSE Exhibit Status</title>
    	<link rel="icon" type="image/png" href="images/twoselogo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        /* Modern Colorful Tech Theme - Enhanced with slate, sapphire, and indigo hints */
        body {
            background-color: #f1f5f9;
            background-image: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 50%, #f1f5f9 100%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            color: #1e293b;
        }

        /* 10 Gallery Cards: Sleek white panels with interactive colorful depth accents */
        .gallery-card {
            background: #ffffff;
            border: 1px solid #c7d2fe;
            box-shadow: 0 4px 10px -1px rgba(99, 102, 241, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gallery-card:hover {
            transform: translateY(-4px);
            border-color: #4f46e5;
            box-shadow: 0 12px 20px -3px rgba(79, 70, 229, 0.15), 0 4px 8px -4px rgba(79, 70, 229, 0.1);
        }

        /* HIGH-VISIBILITY STATUS RECTANGLES - Clean Rich Modulations */
        .status-clear {
            background: #ffffff !important;
            border-left: 6px solid #10b981 !important;
            border-top: 1px solid #e2e8f0 !important;
            border-right: 1px solid #e2e8f0 !important;
            border-bottom: 1px solid #e2e8f0 !important;
            color: #065f46 !important;
        }
        .status-clear:hover {
            background: #f0fdf4 !important;
        }

        .status-working {
            background: #ffffff !important;
            border-left: 6px solid #f59e0b !important;
            border-top: 1px solid #e2e8f0 !important;
            border-right: 1px solid #e2e8f0 !important;
            border-bottom: 1px solid #e2e8f0 !important;
            color: #92400e !important;
        }
        .status-working:hover {
            background: #fef3c7 !important;
        }

        .status-problem {
            background: #ffffff !important;
            border-left: 6px solid #ef4444 !important;
            border-top: 1px solid #e2e8f0 !important;
            border-right: 1px solid #e2e8f0 !important;
            border-bottom: 1px solid #e2e8f0 !important;
            color: #991b1b !important;
        }
        .status-problem:hover {
            background: #fee2e2 !important;
        }

        /* Status Badges */
        .badge-clear { background-color: #10b981; color: #fff; }
        .badge-working { background-color: #f59e0b; color: #fff; }
        .badge-problem { background-color: #ef4444; color: #fff; }

        /* Input Overrides: Pure White background with solid black text */
        textarea, input[type="text"] {
            background-color: #ffffff !important;
            border: 1px solid #cbd5e1 !important;
            color: #0f172a !important;
        }
        textarea:focus, input[type="text"]:focus {
            border-color: #4f46e5 !important;
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15) !important;
        }
    </style>
</head>
<body class="font-sans min-h-screen pb-12" x-data="appState()" @popstate.window="handleBrowserNavigation($event)">

    <header class="border-b-2 border-indigo-500/20 bg-gradient-to-r from-slate-900 to-indigo-950 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3.5 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <button 
                    x-show="currentView !== 'home'" 
                    @click="goBack()"
                    class="bg-indigo-900/60 hover:bg-indigo-800 text-xs md:text-sm font-bold px-4 py-2 rounded-lg border border-indigo-400/40 text-indigo-200 transition shadow-sm"
                >
                    ← BACK
                </button>
     <div class="flex items-center space-x-3 cursor-pointer" @click="goHome()">
    <img src="images/twoselogo.png" alt="Logo" class="h-10 w-auto">
    
    <h1 class="text-base md:text-xl font-black tracking-wider text-white uppercase">
        TWOSE <span class="text-indigo-400">Exhibit Status</span>
    </h1>
</div>
            </div>

            <button 
                @click="toggleProfile()"
                class="text-[10px] md:text-xs font-mono bg-slate-800 hover:bg-slate-750 border border-slate-700 px-3 py-1.5 rounded-md text-slate-300 transition-all cursor-pointer flex items-center space-x-1.5 shadow-inner"
                title="Click to switch profile mode"
            >
                <span class="text-slate-400 font-bold">STATION:</span>
                <span x-text="currentProfile === 'technician' ? 'TECHNICIAN' : 'GALLERY STAFF'"
                      :class="currentProfile === 'technician' ? 'text-cyan-400' : 'text-amber-400'"
                      class="font-bold uppercase tracking-wider">
                </span>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <div x-show="currentView === 'home'">
            <div class="mb-6 flex items-center space-x-3">
                <div class="w-2 h-6 bg-indigo-600 rounded-full"></div>
                <h2 class="text-xl md:text-2xl font-black uppercase tracking-widest text-slate-800">SELECT A GALLERY</h2>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-5 gap-5">
                <template x-for="gallery in galleries" :key="gallery.id">
                    <button 
                        @click="selectGallery(gallery)"
                        class="gallery-card aspect-square rounded-2xl p-4 flex flex-col justify-between text-left relative overflow-hidden group border-b-4 border-b-indigo-200"
                    >
                        <div class="w-full h-20 md:h-24 rounded-xl bg-indigo-50 border border-indigo-100 mb-2 overflow-hidden flex items-center justify-center group-hover:bg-indigo-600 transition-colors duration-300">
                            <svg class="w-6 h-6 text-indigo-500 group-hover:text-white transition-colors duration-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 00-1.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                            </svg>
                        </div>

                        <span class="font-extrabold text-sm md:text-base tracking-wide text-slate-800 group-hover:text-indigo-600 transition-colors line-clamp-2" x-text="gallery.name"></span>
                        
                        <div class="flex items-center justify-between mt-2 pt-2 border-t border-slate-100">
                            <span class="text-[10px] font-mono tracking-wider text-slate-400 font-bold" x-text="`${gallery.exhibits.length} EXHIBITS`"></span>
                            
                            <div :class="{
                                'bg-red-500 shadow-[0_0_8px_#ef4444]': getGalleryStatus(gallery) === 'problem',
                                'bg-amber-500 shadow-[0_0_8px_#f59e0b]': getGalleryStatus(gallery) === 'working',
                                'bg-emerald-500 shadow-[0_0_8px_#10b981]': getGalleryStatus(gallery) === 'clear'
                            }" class="w-3 h-3 rounded-full transition-all duration-300"></div>
                        </div>
                    </button>
                </template>
            </div>
        </div>

        <div x-show="currentView === 'gallery'" x-cloak>
            <div class="mb-6 border-b-2 border-indigo-100 pb-4 flex items-center space-x-3">
                <div class="w-2 h-8 bg-indigo-600 rounded-full"></div>
                <h2 class="text-2xl md:text-3xl font-black tracking-tight text-slate-800 uppercase mt-1" x-text="selectedGallery?.name"></h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <template x-for="exhibit in selectedGallery?.exhibits" :key="exhibit.name">
                    <button 
                        @click="selectExhibit(exhibit)"
                        :class="{
                            'status-clear': exhibit.status === 'clear',
                            'status-problem': exhibit.status === 'problem',
                            'status-working': exhibit.status === 'working'
                        }"
                        class="p-5 rounded-xl text-left transition-all duration-200 flex justify-between items-center group shadow-md hover:shadow-lg font-semibold"
                    >
                        <span class="text-base tracking-wide font-extrabold" x-text="exhibit.name"></span>
                        
                        <span :class="{
                            'badge-clear': exhibit.status === 'clear',
                            'badge-problem': exhibit.status === 'problem',
                            'badge-working': exhibit.status === 'working'
                        }" class="text-[10px] uppercase font-mono tracking-widest px-3 py-1 rounded-md shrink-0 font-black shadow-sm"
                           x-text="exhibit.status === 'clear' ? 'OPERATIONAL' : (exhibit.status === 'problem' ? 'OUT OF ORDER' : 'UNDER MAINTENANCE')">
                        </span>
                    </button>
                </template>
            </div>
        </div>

        <div x-show="currentView === 'exhibit'" x-cloak class="max-w-3xl mx-auto">
            <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4 border-b-2 border-indigo-100 pb-4">
                <div>
                    <p class="text-xs text-indigo-600 font-mono font-bold uppercase tracking-widest" x-text="selectedGallery?.name"></p>
                    <h2 class="text-3xl font-black uppercase text-slate-800 tracking-wide" x-text="selectedExhibit?.name"></h2>
                </div>
                
                <div :class="{
                    'bg-emerald-600 text-white border-emerald-700': selectedExhibit?.status === 'clear',
                    'bg-rose-600 text-white border-rose-700': selectedExhibit?.status === 'problem',
                    'bg-amber-500 text-white border-amber-600': selectedExhibit?.status === 'working'
                }" class="px-5 py-2.5 border rounded-xl font-mono text-xs font-black text-center uppercase tracking-widest shadow-md"
                   x-text="selectedExhibit?.status === 'clear' ? 'OPERATIONAL' : (selectedExhibit?.status === 'problem' ? 'OUT OF ORDER' : 'UNDER MAINTENANCE')">
                </div>
            </div>

            <section 
                x-show="currentProfile === 'technician' || (selectedExhibit?.techOverviewNote && selectedExhibit.techOverviewNote.trim() !== '') || (selectedExhibit?.exhibitImage)"
                class="bg-gradient-to-br from-white to-indigo-50/20 border border-indigo-200 p-5 rounded-2xl shadow-md mb-6 flex flex-col md:flex-row gap-5"
            >
                <div class="flex-1">
                    <div class="flex items-center space-x-2 text-indigo-600 font-extrabold uppercase tracking-wider mb-2.5">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                        </svg>
                        <h3 class="text-xs font-mono tracking-widest">Exhibit Notes</h3>
                    </div>

                    <div x-show="currentProfile !== 'technician'">
                        <p class="text-sm text-slate-800 leading-relaxed font-mono bg-white border border-slate-200 rounded-xl p-3 min-h-[4rem] shadow-sm" 
                           x-text="selectedExhibit?.techOverviewNote || 'No description notes recorded.'"></p>
                    </div>

                    <div x-show="currentProfile === 'technician'">
                        <textarea 
                            x-model="selectedExhibit.techOverviewNote"
                            @input="saveNotesLocal()"
                            rows="2"
                            placeholder="Type an exhibit overview description here (saves automatically)..."
                            class="w-full text-sm font-mono p-2.5 rounded-xl bg-white text-slate-900 border border-slate-200 focus:ring-2 focus:ring-indigo-500 shadow-inner"
                        ></textarea>
                    </div>
                </div>

                <div 
                    x-show="currentProfile === 'technician' || (selectedExhibit && selectedExhibit.exhibitImage)" 
                    class="w-full md:w-36 h-28 bg-indigo-50/50 border-2 border-dashed border-indigo-200 rounded-xl flex flex-col items-center justify-center text-center p-2 shrink-0 overflow-hidden relative group shadow-inner"
                >
                    <template x-if="selectedExhibit && selectedExhibit.exhibitImage">
                        <img :src="selectedExhibit.exhibitImage" @click="openLightbox(selectedExhibit.exhibitImage)" class="w-full h-full object-cover rounded-lg cursor-pointer hover:opacity-90">
                    </template>
                    <template x-if="currentProfile === 'technician' && (!selectedExhibit || !selectedExhibit.exhibitImage)">
                        <div class="flex flex-col items-center text-indigo-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <span class="text-[9px] uppercase font-mono tracking-wider font-bold">No Image Set</span>
                        </div>
                    </template>
                    
                    <div x-show="currentProfile === 'technician'" class="absolute inset-0 bg-indigo-950/90 opacity-0 group-hover:opacity-100 transition flex items-center justify-center cursor-pointer">
                        <label class="text-[9px] font-mono text-cyan-400 font-bold uppercase cursor-pointer text-center px-1">
                            Upload Photo
                            <input type="file" accept="image/*" class="hidden" @change="uploadExhibitImage($event)">
                        </label>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-6">
                <div class="flex items-center space-x-2 text-slate-700 font-bold uppercase tracking-widest mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    <h3 class="text-sm font-black">Report an Issue</h3>
                </div>
                
                <form @submit.prevent="submitIssue()">
                    <div class="mb-4">
                        <label class="block text-[10px] font-mono font-bold uppercase tracking-wider text-slate-400 mb-1.5">Description</label>
                        <textarea 
                            x-model="issueText"
                            rows="3" 
                            required
                            placeholder="What is happening with this exhibit?"
                            class="w-full rounded-lg p-3 text-sm border-2 border-indigo-100 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition duration-200 font-mono bg-indigo-50/30 text-slate-900 shadow-inner"
                        ></textarea>
                    </div>

                    <div class="flex items-center justify-between gap-4">
                        <div class="flex-1">
                            <label class="cursor-pointer flex items-center space-x-2 text-xs font-mono text-slate-500 hover:text-indigo-600 transition">
                                <input type="file" accept="image/*" class="hidden" @change="handleUploadedIssuePhoto($event)" />
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                </svg>
                                <span x-text="uploadedIssuePhotoBase64 ? 'Photo Attached' : 'Attach Photo'"></span>
                            </label>
                        </div>

                        <button 
                            type="submit"
                            class="bg-slate-800 hover:bg-indigo-600 text-white font-bold text-xs uppercase tracking-widest py-2 px-6 rounded-lg transition duration-200 shadow-md"
                        >
                            Submit
                        </button>
                    </div>
                </form>

                <div class="mt-6 pt-6 border-t-2 border-indigo-50">
                    <h4 class="text-xs font-mono font-bold uppercase tracking-widest text-indigo-600 mb-3 flex items-center space-x-1.5">
                        <span>Active Issues Logged By Staff</span>
                        <span class="bg-indigo-100 text-indigo-800 text-[10px] px-2 py-0.5 rounded-full font-black" x-text="selectedExhibit?.activeReports?.length || 0"></span>
                    </h4>
                    
                    <div class="space-y-2.5">
                        <template x-for="(report, index) in selectedExhibit?.activeReports" :key="index">
                            <div class="bg-gradient-to-r from-white to-rose-50/20 border-l-4 border-l-rose-500 border-t border-r border-b border-slate-200 rounded-xl p-3 flex items-start justify-between gap-4 shadow-sm">
                                <div class="flex gap-3">
                                    <template x-if="report.photo">
                                        <img :src="report.photo" @click="openLightbox(report.photo)" class="w-12 h-12 rounded object-cover border border-slate-200 shrink-0 mt-0.5 shadow-sm cursor-pointer hover:scale-105 transition-transform duration-150" title="Click to view full image">
                                    </template>
                                    <div>
                                        <p class="text-xs font-mono text-slate-900 font-semibold" x-text="report.text"></p>
                                        <span class="text-[9px] font-mono text-slate-400 font-bold" x-text="report.timestamp"></span>
                                    </div>
                                </div>
                                
                                <div class="shrink-0">
                                    <button 
                                        x-show="currentProfile === 'technician'"
                                        @click="resolveIssue(index)"
                                        class="text-[10px] font-mono bg-emerald-600 text-white border border-emerald-700 px-3 py-1.5 rounded-md hover:bg-emerald-700 transition font-black shadow-sm"
                                    >
                                        Resolve & Remove
                                    </button>
                                    <span 
                                        x-show="currentProfile !== 'technician'" 
                                        class="text-[9px] font-mono text-amber-700 bg-amber-100 border border-amber-200 px-2.5 py-1 rounded-md font-bold block shadow-sm"
                                    >
                                        Pending Review
                                    </span>
                                </div>
                            </div>
                        </template>

                        <template x-if="!selectedExhibit?.activeReports || selectedExhibit.activeReports.length === 0">
                            <p class="text-xs text-slate-400 font-mono italic bg-slate-50 border border-slate-100 rounded-xl p-4 text-center shadow-inner">No outstanding staff issues reported on this line item.</p>
                        </template>
                    </div>
                </div>
            </section>

            <section class="bg-white border border-indigo-100 p-6 rounded-2xl shadow-md">
                <div class="flex items-center space-x-2.5 text-indigo-600 font-bold uppercase tracking-wider mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782(0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                    <h3 class="text-xs font-mono tracking-widest">Technician Activity</h3>
                </div>
                
                <div x-show="currentProfile !== 'technician'">
                    <p class="text-sm text-slate-800 leading-relaxed font-mono bg-slate-50 border border-slate-200 rounded-xl p-4 min-h-[4rem] shadow-inner" 
                       x-text="selectedExhibit?.techNotes || 'No historical maintenance notes recorded for this exhibit.'"></p>
                </div>

                <div x-show="currentProfile === 'technician'">
                    <textarea 
                        x-model="selectedExhibit.techNotes"
                        @input="saveNotesLocal()"
                        rows="4"
                        placeholder="Type or modify historical tech maintenance logs here (saves automatically)..."
                        class="w-full text-sm font-mono p-3 rounded-xl bg-white text-slate-900 border border-slate-200 focus:ring-2 focus:ring-indigo-500 shadow-inner"
                    ></textarea>
                </div>
                
                <div x-show="currentProfile === 'technician'" class="mt-4 pt-4 border-t border-slate-100 flex flex-wrap items-center gap-2">
                    <span class="text-[11px] font-mono uppercase text-slate-400 font-bold mr-2">Override Status:</span>
                    <button @click="changeStatus('clear')" class="text-[10px] font-mono tracking-wider bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-md font-black transition shadow-sm">Mark Operational (Clear)</button>
                    <button @click="changeStatus('working')" class="text-[10px] font-mono tracking-wider bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-md font-black transition shadow-sm">Set to Maintenance Mode</button>
                </div>
                <div x-show="currentProfile === 'gallerystaff'" class="mt-4 pt-3 border-t border-slate-100 text-xs font-mono text-slate-400 font-medium italic">
                    🔒 Status adjustments are locked. Maintenance tools are restricted to technicians.
                </div>
            </section>
        </div>

    </main>

    <div 
        x-show="lightboxOpen" 
        x-cloak 
        @keydown.escape.window="lightboxOpen = false"
        class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 transition-opacity duration-300"
        @click="lightboxOpen = false"
    >
        <div class="relative max-w-4xl max-h-[85vh] flex flex-col items-center">
            <button 
                @click="lightboxOpen = false" 
                class="absolute -top-12 right-0 text-white hover:text-indigo-400 text-sm font-mono tracking-widest font-black bg-slate-900/80 px-3 py-1 rounded-lg border border-slate-700 shadow-md"
            >
                CLOSE [ESC]
            </button>
            <img :src="lightboxImage" class="max-w-full max-h-[80vh] rounded-xl shadow-2xl border-2 border-indigo-500/20 object-contain" @click.stop>
        </div>
    </div>

    <script>
        function appState() {
            return {
                currentView: 'home',
                currentProfile: 'gallerystaff',
                selectedGallery: null,
                selectedExhibit: null,
                issueText: '',
                uploadedIssuePhotoBase64: null,
                
                // Lightbox Modal State
                lightboxOpen: false,
                lightboxImage: '',

                // Custom Router Sync Framework
                init() {
                    // Seed the initial history endpoint data state layout
                    if (!window.history.state) {
                        window.history.replaceState({ view: 'home', galleryId: null, exhibitName: null }, '', '');
                    }
                },

                handleBrowserNavigation(event) {
                    const state = event.state;
                    if (!state) return;

                    this.currentView = state.view;

                    if (state.galleryId) {
                        this.selectedGallery = this.galleries.find(g => g.id === state.galleryId) || null;
                    } else {
                        this.selectedGallery = null;
                    }

                    if (state.exhibitName && this.selectedGallery) {
                        this.selectedExhibit = this.selectedGallery.exhibits.find(e => e.name === state.exhibitName) || null;
                    } else {
                        this.selectedExhibit = null;
                    }
                },

                pushHistoryState() {
                    const stateObj = {
                        view: this.currentView,
                        galleryId: this.selectedGallery ? this.selectedGallery.id : null,
                        exhibitName: this.selectedExhibit ? this.selectedExhibit.name : null
                    };
                    window.history.pushState(stateObj, '', '');
                },

                openLightbox(imgSrc) {
                    if (!imgSrc) return;
                    this.lightboxImage = imgSrc;
                    this.lightboxOpen = true;
                },

                toggleProfile() {
                    if (this.currentProfile === 'gallerystaff') {
                        const passwordInput = prompt("Enter verification key to activate Technician mode:");
                        if (passwordInput === 'twose') {
                            this.currentProfile = 'technician';
                        } else if (passwordInput !== null) {
                            alert("ACCESS DENIED: Invalid configuration credentials.");
                        }
                    } else {
                        this.currentProfile = 'gallerystaff';
                    }
                },

                getGalleryStatus(gallery) {
                    const statuses = gallery.exhibits.map(e => e.status);
                    if (statuses.includes('problem')) return 'problem'; 
                    if (statuses.includes('working')) return 'working'; 
                    return 'clear'; 
                },

                uploadExhibitImage(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.selectedExhibit.exhibitImage = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                handleUploadedIssuePhoto(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.uploadedIssuePhotoBase64 = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                saveNotesLocal() {},

                submitIssue() {
                    if(!this.selectedExhibit) return;
                    
                    const timestampStr = new Date().toLocaleString();
                    const newReport = {
                        text: this.issueText,
                        photo: this.uploadedIssuePhotoBase64,
                        timestamp: timestampStr
                    };

                    if (!this.selectedExhibit.activeReports) {
                        this.selectedExhibit.activeReports = [];
                    }

                    this.selectedExhibit.activeReports.push(newReport);
                    this.selectedExhibit.status = 'problem';
                    
                    this.issueText = '';
                    this.uploadedIssuePhotoBase64 = null;
                },

                resolveIssue(index) {
                    if (!this.selectedExhibit || !this.selectedExhibit.activeReports) return;
                    this.selectedExhibit.activeReports.splice(index, 1);
                    
                    if (this.selectedExhibit.activeReports.length === 0) {
                        this.selectedExhibit.status = 'clear';
                    }
                },

                changeStatus(newStatus) {
                    if(this.selectedExhibit && this.currentProfile === 'technician') {
                        this.selectedExhibit.status = newStatus;
                    }
                },

                selectGallery(gallery) {
                    this.selectedGallery = gallery;
                    this.currentView = 'gallery';
                    this.pushHistoryState();
                    window.scrollTo(0,0);
                },

                selectExhibit(exhibit) {
                    this.selectedExhibit = exhibit;
                    if (!this.selectedExhibit.activeReports) this.selectedExhibit.activeReports = [];
                    if (!this.selectedExhibit.techOverviewNote) this.selectedExhibit.techOverviewNote = '';
                    if (!this.selectedExhibit.exhibitImage) this.selectedExhibit.exhibitImage = null;
                    if (!this.selectedExhibit.techNotes) this.selectedExhibit.techNotes = '';
                    
                    this.currentView = 'exhibit';
                    this.issueText = '';
                    this.uploadedIssuePhotoBase64 = null;
                    this.pushHistoryState();
                    window.scrollTo(0,0);
                },

                goBack() {
                    if (this.currentView === 'exhibit') {
                        this.currentView = 'gallery';
                        this.selectedExhibit = null;
                    } else if (this.currentView === 'gallery') {
                        this.currentView = 'home';
                        this.selectedGallery = null;
                    }
                    this.pushHistoryState();
                },

                goHome() {
                    this.currentView = 'home';
                    this.selectedGallery = null;
                    this.selectedExhibit = null;
                    this.pushHistoryState();
                },
